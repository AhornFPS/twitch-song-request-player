<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Twitch Song Request Player Control Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=IBM+Plex+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/dashboard.css?v=20260319a" />
  </head>
  <body data-dashboard-layout="atlas">
    <main id="dashboard-root" class="dashboard-root" aria-live="polite"></main>

    <div id="update-modal" class="modal-overlay">
      <div class="modal update-modal" role="dialog" aria-labelledby="update-modal-title" aria-describedby="update-release-notes">
        <div class="modal__header">
          <h2 id="update-modal-title">Update Available</h2>
        </div>
        <div class="modal__body">
          <p id="update-version-text" class="modal-copy"></p>
          <div class="update-notes-container">
            <div id="update-release-notes" class="update-notes"></div>
          </div>
          <div id="update-progress-container" class="update-progress" hidden>
            <div class="update-progress__bar">
              <div id="update-progress-fill" class="update-progress__fill" style="width: 0%"></div>
            </div>
            <span id="update-progress-text" class="update-progress__text">Downloading... 0%</span>
          </div>
          <p id="update-error-text" class="feedback is-error" hidden></p>
        </div>
        <div class="modal__footer">
          <button id="update-skip-btn" class="ghost-button" type="button">Skip for now</button>
          <button id="update-action-btn" class="primary-button" type="button">Download Update</button>
        </div>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/dashboard.js?v=20260319a"></script>
  </body>
</html>
